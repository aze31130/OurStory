name: Build

on:
- push
- pull_request

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      name: Checkout repo

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn package

    - uses: actions/upload-artifact@v4
      name: Upload Artifact
      with:
        name: OurStory
        path: target/*.jar
